<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Todo List</title><script defer="defer" src="main.js"></script></head><body><div class="main"><div id="sidebar"><button class="add-project">Add Project</button><div class="projects"></div></div><div id="content"></div></div><dialog id="project-dialog"><div class="modal-content"><div class="modal-header"><h4>New Project</h4></div><div class="modal-body"><form class="project-name" method="dialog"><p><label>Project Name: <input id="project-name" required></label></p><div class="dialog-buttons"><button type="button" id="cancel-project-name">Cancel</button> <button>Submit</button></div></form></div></div></dialog><dialog id="todo-dialog"><div class="modal-content"><div class="modal-header"><h4 class="todo-header"></h4></div><div class="modal-body"><form class="todo" method="dialog"><p><label>Title: <input class="dialog-todo-title" required></label></p><p><label>Description: <textarea class="dialog-todo-desc"></textarea></label></p><p><label>Due Date: <input type="date" class="dialog-todo-date"></label></p><p><label>Priority: <select name="todo-priority" class="dialog-todo-priority"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></label></p><div class="dialog-buttons"><button type="button" id="cancel-todo">Cancel</button> <button>Submit</button></div></form></div></div></dialog></body></html>
